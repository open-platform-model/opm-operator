version: '3'

# ModulePackage CR end-to-end test tasks.
#
# Each task operates on one modulepackage fixture under
# test/fixtures/modulepackages/<PKG> (default PKG=hello). Override the package with
# `PKG=<name>` (one of: hello, hello-web, podinfo, redis), or publish them all with
# `task release:publish:all`.
#
# Prerequisites:
#   - Local registry running: `task registry:start`
#   - Registry connected to kind network: `task registry:connect`
#   - Underlying test modules published: `task examples:publish`
#   - Flux source-controller installed: `task flux:install`
#   - Controller running (or deployed): `task build:run` / `task deploy:controller`

vars:
  PKG: '{{.PKG | default "hello"}}'
  PKGS: '{{.PKGS | default "hello hello-web podinfo redis"}}'
  RELEASE_DIR: '{{.RELEASE_DIR | default (printf "test/fixtures/modulepackages/%s" .PKG)}}'
  RELEASE_REPO: '{{.RELEASE_REPO | default (printf "oci://localhost:5000/opmodel.dev/releases/test/%s" .PKG)}}'
  RELEASE_GHCR_REPO: '{{.RELEASE_GHCR_REPO | default (printf "oci://ghcr.io/open-platform-model/opmodel.dev/releases/test/%s" .PKG)}}'
  RELEASE_TAG: '{{.RELEASE_TAG | default "v0.0.1"}}'

tasks:
  publish:
    desc: Push the {{.PKG}} modulepackage fixture as a Flux OCI artifact to the local registry
    preconditions:
      - sh: command -v {{.FLUX}} >/dev/null 2>&1
        msg: 'flux CLI not found — install from https://fluxcd.io/flux/installation/'
    cmds:
      - |
        {{.FLUX}} push artifact {{.RELEASE_REPO}}:{{.RELEASE_TAG}} \
          --path={{.RELEASE_DIR}} \
          --source="opm-operator/test/fixtures" \
          --revision="{{.RELEASE_TAG}}"

  publish:all:
    desc: Push every modulepackage fixture ({{.PKGS}}) as a Flux OCI artifact to the local registry
    cmds:
      - for: {var: PKGS}
        task: publish
        vars:
          PKG: '{{.ITEM}}'

  publish:ghcr:
    desc: Push the {{.PKG}} modulepackage fixture as a Flux OCI artifact to GHCR (requires `docker login ghcr.io` or ORAS-compatible creds)
    preconditions:
      - sh: command -v {{.FLUX}} >/dev/null 2>&1
        msg: 'flux CLI not found — install from https://fluxcd.io/flux/installation/'
    cmds:
      - |
        {{.FLUX}} push artifact {{.RELEASE_GHCR_REPO}}:{{.RELEASE_TAG}} \
          --path={{.RELEASE_DIR}} \
          --source="opm-operator/test/fixtures" \
          --revision="{{.RELEASE_TAG}}"

  apply:
    desc: Apply OCIRepository + ModulePackage manifests for the {{.PKG}} fixture
    cmds:
      - '{{.KUBECTL}} apply -f {{.RELEASE_DIR}}/ocirepository.yaml'
      - '{{.KUBECTL}} apply -f {{.RELEASE_DIR}}/modulepackage.yaml'

  delete:
    desc: Remove the {{.PKG}} ModulePackage CR + OCIRepository
    cmds:
      - '{{.KUBECTL}} delete --ignore-not-found -f {{.RELEASE_DIR}}/modulepackage.yaml'
      - '{{.KUBECTL}} delete --ignore-not-found -f {{.RELEASE_DIR}}/ocirepository.yaml'
