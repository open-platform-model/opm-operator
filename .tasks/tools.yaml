version: '3'

tasks:
  controller-gen:
    internal: true
    run: once
    status:
      - test -f "{{.LOCALBIN}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}"
      - |
        test "$(readlink -- "{{.LOCALBIN}}/controller-gen" 2>/dev/null)" = "$(realpath "{{.LOCALBIN}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}")"
    cmds:
      - mkdir -p "{{.LOCALBIN}}"
      - rm -f "{{.CONTROLLER_GEN}}"
      - GOBIN="{{.LOCALBIN}}" go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_TOOLS_VERSION}}
      - mv "{{.LOCALBIN}}/controller-gen" "{{.LOCALBIN}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}"
      - ln -sf "$(realpath "{{.LOCALBIN}}/controller-gen-{{.CONTROLLER_TOOLS_VERSION}}")" "{{.LOCALBIN}}/controller-gen"

  kustomize:
    internal: true
    run: once
    status:
      - test -f "{{.LOCALBIN}}/kustomize-{{.KUSTOMIZE_VERSION}}"
      - |
        test "$(readlink -- "{{.LOCALBIN}}/kustomize" 2>/dev/null)" = "$(realpath "{{.LOCALBIN}}/kustomize-{{.KUSTOMIZE_VERSION}}")"
    cmds:
      - mkdir -p "{{.LOCALBIN}}"
      - rm -f "{{.KUSTOMIZE}}"
      - GOBIN="{{.LOCALBIN}}" go install sigs.k8s.io/kustomize/kustomize/v5@{{.KUSTOMIZE_VERSION}}
      - mv "{{.LOCALBIN}}/kustomize" "{{.LOCALBIN}}/kustomize-{{.KUSTOMIZE_VERSION}}"
      - ln -sf "$(realpath "{{.LOCALBIN}}/kustomize-{{.KUSTOMIZE_VERSION}}")" "{{.LOCALBIN}}/kustomize"

  envtest:
    internal: true
    run: once
    status:
      - test -f "{{.LOCALBIN}}/setup-envtest-{{.ENVTEST_VERSION}}"
      - |
        test "$(readlink -- "{{.LOCALBIN}}/setup-envtest" 2>/dev/null)" = "$(realpath "{{.LOCALBIN}}/setup-envtest-{{.ENVTEST_VERSION}}")"
    cmds:
      - mkdir -p "{{.LOCALBIN}}"
      - rm -f "{{.ENVTEST}}"
      - GOBIN="{{.LOCALBIN}}" go install sigs.k8s.io/controller-runtime/tools/setup-envtest@{{.ENVTEST_VERSION}}
      - mv "{{.LOCALBIN}}/setup-envtest" "{{.LOCALBIN}}/setup-envtest-{{.ENVTEST_VERSION}}"
      - ln -sf "$(realpath "{{.LOCALBIN}}/setup-envtest-{{.ENVTEST_VERSION}}")" "{{.LOCALBIN}}/setup-envtest"

  setup-envtest:
    internal: true
    run: once
    deps: [envtest]
    cmds:
      - |
        echo "Setting up envtest binaries for Kubernetes version {{.ENVTEST_K8S_VERSION}}..."
        "{{.ENVTEST}}" use {{.ENVTEST_K8S_VERSION}} --bin-dir "{{.LOCALBIN}}" -p path || {
          echo "Error: Failed to set up envtest binaries for version {{.ENVTEST_K8S_VERSION}}."
          exit 1
        }

  golangci-lint:
    internal: true
    run: once
    status:
      - test -f "{{.LOCALBIN}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}"
      - |
        test "$(readlink -- "{{.LOCALBIN}}/golangci-lint" 2>/dev/null)" = "$(realpath "{{.LOCALBIN}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}")"
    cmds:
      - mkdir -p "{{.LOCALBIN}}"
      - rm -f "{{.GOLANGCI_LINT}}"
      - GOBIN="{{.LOCALBIN}}" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - mv "{{.LOCALBIN}}/golangci-lint" "{{.LOCALBIN}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}"
      - ln -sf "$(realpath "{{.LOCALBIN}}/golangci-lint-{{.GOLANGCI_LINT_VERSION}}")" "{{.LOCALBIN}}/golangci-lint"
      - |
        if [ -f .custom-gcl.yml ]; then
          echo "Building custom golangci-lint with plugins..."
          "{{.LOCALBIN}}/golangci-lint" custom --destination "{{.LOCALBIN}}" --name golangci-lint-custom
          mv -f "{{.LOCALBIN}}/golangci-lint-custom" "{{.LOCALBIN}}/golangci-lint"
        fi
