---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: releases.releases.opmodel.dev
spec:
  group: releases.opmodel.dev
  names:
    kind: Release
    listKind: ReleaseList
    plural: releases
    shortNames:
    - rel
    singular: release
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.sourceRef.name
      name: Source
      type: string
    - jsonPath: .spec.path
      name: Path
      type: string
    - jsonPath: .status.source.artifactRevision
      name: Revision
      priority: 1
      type: string
    - jsonPath: .status.nextRetryAt
      name: Retry
      priority: 1
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Release is the Schema for the releases API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Release
            properties:
              dependsOn:
                description: |-
                  DependsOn references other Release CRs that must be Ready=True before
                  this Release is reconciled. References are same-namespace only.
                items:
                  description: |-
                    NamespacedObjectReference contains enough information to locate the referenced Kubernetes resource object in any
                    namespace.
                  properties:
                    name:
                      description: Name of the referent.
                      type: string
                    namespace:
                      description: Namespace of the referent, when not specified it
                        acts as LocalObjectReference.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              interval:
                description: |-
                  Interval at which the reconciler re-evaluates the release to detect drift
                  and re-apply. Also the requeue interval after transient failures.
                type: string
              path:
                description: |-
                  Path is the directory within the artifact containing release.cue.
                  Example: "releases/prod/minecraft".
                minLength: 1
                type: string
              prune:
                description: |-
                  Prune enables deletion of stale resources on reconcile and of all owned
                  resources on Release deletion.
                type: boolean
              rollout:
                description: Rollout configures apply behavior.
                properties:
                  forceConflicts:
                    description: ForceConflicts enables SSA force ownership when desired.
                    type: boolean
                  strategy:
                    description: Strategy controls how apply operations are performed.
                    enum:
                    - Apply
                    type: string
                type: object
              serviceAccountName:
                description: |-
                  ServiceAccountName is the name of the ServiceAccount used to impersonate
                  during apply and prune. Empty means use the controller's identity.
                type: string
              sourceRef:
                description: |-
                  SourceRef references a Flux source (OCIRepository, GitRepository, or Bucket)
                  that provides the artifact containing the CUE release package.
                properties:
                  apiVersion:
                    description: API version of the referent, if not specified the
                      Kubernetes preferred version will be used.
                    type: string
                  kind:
                    description: Kind of the referent.
                    type: string
                  name:
                    description: Name of the referent.
                    type: string
                  namespace:
                    description: Namespace of the referent, when not specified it
                      acts as LocalObjectReference.
                    type: string
                required:
                - kind
                - name
                type: object
              suspend:
                description: Suspend halts reconciliation when true.
                type: boolean
            required:
            - path
            - sourceRef
            type: object
          status:
            description: status defines the observed state of Release
            properties:
              conditions:
                description: conditions represent the current state of the Release
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failureCounters:
                description: FailureCounters tracks bounded reconcile failure counts
                  by action.
                properties:
                  apply:
                    format: int64
                    type: integer
                  drift:
                    format: int64
                    type: integer
                  prune:
                    format: int64
                    type: integer
                  reconcile:
                    format: int64
                    type: integer
                type: object
              history:
                items:
                  description: HistoryEntry captures a compact reconcile history record.
                  properties:
                    action:
                      type: string
                    configDigest:
                      type: string
                    finishedAt:
                      format: date-time
                      type: string
                    inventoryCount:
                      format: int64
                      type: integer
                    inventoryDigest:
                      type: string
                    message:
                      type: string
                    phase:
                      type: string
                    renderDigest:
                      type: string
                    sequence:
                      format: int64
                      type: integer
                    sourceDigest:
                      type: string
                    startedAt:
                      format: date-time
                      type: string
                  type: object
                type: array
              inventory:
                description: Inventory stores the current set of owned resources.
                properties:
                  count:
                    format: int64
                    type: integer
                  digest:
                    type: string
                  entries:
                    items:
                      description: InventoryEntry identifies one owned Kubernetes
                        resource.
                      properties:
                        component:
                          type: string
                        group:
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        namespace:
                          type: string
                        v:
                          type: string
                      required:
                      - kind
                      - name
                      type: object
                    type: array
                  revision:
                    format: int64
                    type: integer
                type: object
              lastAppliedAt:
                format: date-time
                type: string
              lastAppliedConfigDigest:
                type: string
              lastAppliedRenderDigest:
                type: string
              lastAppliedSourceDigest:
                type: string
              lastAttemptedAction:
                type: string
              lastAttemptedAt:
                format: date-time
                type: string
              lastAttemptedConfigDigest:
                type: string
              lastAttemptedDuration:
                type: string
              lastAttemptedRenderDigest:
                type: string
              lastAttemptedSourceDigest:
                type: string
              nextRetryAt:
                description: |-
                  NextRetryAt indicates when the controller will next attempt reconciliation
                  after a transient or stalled failure.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              source:
                description: Source is the resolved Flux source artifact metadata.
                properties:
                  artifactDigest:
                    description: ArtifactDigest is the digest reported by the source
                      artifact.
                    type: string
                  artifactRevision:
                    description: ArtifactRevision is the revision reported by the
                      source artifact.
                    type: string
                  artifactURL:
                    description: ArtifactURL is the fetch URL reported by the source
                      artifact.
                    type: string
                  ref:
                    description: Ref is the resolved source reference.
                    properties:
                      apiVersion:
                        description: API version of the referent, if not specified
                          the Kubernetes preferred version will be used.
                        type: string
                      kind:
                        description: Kind of the referent.
                        type: string
                      name:
                        description: Name of the referent.
                        type: string
                      namespace:
                        description: Namespace of the referent, when not specified
                          it acts as LocalObjectReference.
                        type: string
                    required:
                    - kind
                    - name
                    type: object
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
