apiVersion: releases.opmodel.dev/v1alpha1
kind: ModuleRelease
metadata:
  labels:
    app.kubernetes.io/name: poc-controller
    app.kubernetes.io/managed-by: kustomize
  name: jellyfin
  namespace: default
spec:
  module:
    path: opmodel.dev/modules/jellyfin@v1
    version: v1.0.29
  values:
    image:
      tag: "10.10.7"
    port: 8096
    puid: 1000
    pgid: 1000
    timezone: "Europe/Stockholm"
    storage:
      config:
        type: pvc
        size: "50Gi"
      media:
        movies:
          type: nfs
          server: "nas.local"
          path: "/volume1/movies"
          mountPath: "/data/movies"
        series:
          type: nfs
          server: "nas.local"
          path: "/volume1/series"
          mountPath: "/data/series"
    serviceType: ClusterIP
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "4000m"
        memory: "4Gi"
    logging:
      defaultLevel: Information
      overrides:
        "Jellyfin.Server.Implementations.LiveTv": Warning
  prune: true
