apiVersion: opmodel.dev/v1alpha1
kind: Platform
metadata:
  labels:
    app.kubernetes.io/name: opm-operator
    app.kubernetes.io/managed-by: kustomize
  # Platform is a cluster singleton; the only permitted name is "cluster".
  name: cluster
spec:
  type: kubernetes
  registry:
    opmodel.dev/catalogs/opm:
      filter:
        # The example/fixture modules are core@v1 and pin catalogs/opm@v1
        # (v1.0.0-alpha, the first catalog line on core@v1 vocabulary).
        # Resource/transformer FQNs embed the catalog version, so the platform
        # MUST materialize the same v1 catalog the modules carry — a v0 range
        # (v0.6.0, core@v0) produces "no matching transformer". The lower bound
        # is prerelease-inclusive because plain ">=1.0.0" excludes -alpha tags.
        range: ">=1.0.0-alpha"
