apiVersion: releases.opmodel.dev/v1alpha1
kind: Platform
metadata:
  labels:
    app.kubernetes.io/name: opm-operator
    app.kubernetes.io/managed-by: kustomize
  # Platform is a cluster singleton; the only permitted name is "cluster".
  name: cluster
spec:
  type: kubernetes
  registry:
    opmodel.dev/catalogs/opm:
      filter:
        range: ">=0.1.0 <1.0.0"
