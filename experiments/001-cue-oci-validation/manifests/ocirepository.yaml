apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cue-oci-minimal
  namespace: default
spec:
  interval: 5m
  url: oci://REPLACE_ME_REGISTRY/REPLACE_ME_REPOSITORY
  ref:
    tag: REPLACE_ME_TAG
  layerSelector:
    mediaType: application/zip
    operation: copy
  # Set insecure to true when using a plain HTTP registry.
  insecure: true
  timeout: 1m
