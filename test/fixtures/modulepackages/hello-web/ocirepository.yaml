# OCIRepository pointing at the hello-web release package artifact pushed by
# `task release:publish PKG=hello-web`. Uses the kind-internal registry hostname so the
# Flux source-controller pod can reach the local registry.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: hello-web-release
  namespace: default
spec:
  interval: 1m
  url: oci://opm-registry:5000/opmodel.dev/releases/test/hello-web
  ref:
    tag: v0.0.1
  insecure: true
