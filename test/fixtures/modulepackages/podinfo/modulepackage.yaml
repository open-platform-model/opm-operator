apiVersion: v1
kind: ServiceAccount
metadata:
  name: podinfo-deploy
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: podinfo-deploy
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: podinfo-deploy
    namespace: default
---
apiVersion: opmodel.dev/v1alpha1
kind: ModulePackage
metadata:
  name: podinfo
  namespace: default
spec:
  serviceAccountName: podinfo-deploy
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: OCIRepository
    name: podinfo-release
  path: "."
  interval: 1m
  prune: true
