---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-web-applier
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-web-applier
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-web-applier
  namespace: default
subjects:
  - kind: ServiceAccount
    name: hello-web-applier
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hello-web-applier
---
apiVersion: opmodel.dev/v1alpha1
kind: ModuleInstance
metadata:
  name: hello-web
  namespace: default
spec:
  module:
    path: opmodel.dev/modules/test/hello-web@v0
    version: v0.1.2
  serviceAccountName: hello-web-applier
  values:
    replicas: 2
  prune: true
