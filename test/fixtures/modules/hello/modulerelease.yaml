---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-applier
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-applier
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-applier
  namespace: default
subjects:
  - kind: ServiceAccount
    name: hello-applier
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hello-applier
---
apiVersion: releases.opmodel.dev/v1alpha1
kind: ModuleRelease
metadata:
  name: hello
  namespace: default
spec:
  module:
    path: testing.opmodel.dev/modules/hello@v0
    version: v0.0.1
  serviceAccountName: hello-applier
  values:
    message: "hello from ModuleRelease CR"
  prune: true
