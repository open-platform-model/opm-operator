---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-applier
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-applier
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-applier
  namespace: default
subjects:
  - kind: ServiceAccount
    name: redis-applier
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: redis-applier
---
apiVersion: releases.opmodel.dev/v1alpha1
kind: ModuleRelease
metadata:
  name: redis
  namespace: default
spec:
  module:
    path: opmodel.dev/modules/test/redis@v0
    version: v0.1.0
  serviceAccountName: redis-applier
  # Defaults: redis:7.4, 1Gi PVC (storageClass "standard"). Set
  # persistence.enabled: false for an ephemeral emptyDir instead.
  values:
    persistence:
      size: 1Gi
  prune: true
