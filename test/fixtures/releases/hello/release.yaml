apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-deploy
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-deploy
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: hello-deploy
    namespace: default
---
apiVersion: releases.opmodel.dev/v1alpha1
kind: Release
metadata:
  name: hello
  namespace: default
spec:
  serviceAccountName: hello-deploy
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: OCIRepository
    name: hello-release
  path: "."
  interval: 1m
  prune: true
